<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Coding Project RevoU</title>
    <script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">
	<!--HEADER -->
    <header class="bg-white dark:bg-gray-800 shadow transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-7 py-4 flex justify-between items-center">
            <h1 class="text-lg md:text-xl font-bold">Mini Coding Project</h1>

            <!-- NAV -->
            <div class="flex items-center gap-4">

                <!-- TOGGLE DARK MODE -->
                <button 
                    id="themeToggle"
                    onclick="toggleTheme()"
                    class="w-14 h-7 flex items-center 
                        bg-gray-300 dark:bg-gray-600 
                        rounded-full p-1 
                        transition-colors duration-300"
                >
                    <!-- BULATAN -->
                    <div 
                        id="toggleCircle"
                        class="w-5 h-5 bg-white rounded-full shadow-md transform transition-transform duration-300 flex items-center justify-center"
                    >
                        <i id="themeIcon" data-feather="sun" 
                            class="w-3 h-3 text-yellow-400 dark:text-blue-300 drop-shadow-sm transition-all duration-300">
                        </i>
                    </div>
                </button>

            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-7xl mx-auto px-4 py-6">
		<!-- PENGELUARAN SECTION -->
		<h2 class="flex item-center justify-center text-base md:text-2xl mb-6 font-bold ">
        Expense & Budget Visualizer
        </h2>
        <section class="bg-white dark:bg-gray-800 rounded-xl p-6 md:p-10 mb-6 transition-colors duration-300">
            <h2 class="flex justify-center item-center text-base text-gray-500 dark:text-gray-100 md:text-xl mb-4">
                TOTAL BALANCE
            </h2>
            <h1 id="totalBalance" class="flex justify-center item-center text-blue-500 text-5xl md:text-7xl font-bold mb-6">
				$0
			</h1>
        </section>

        <!-- TRANSACTION SECTION -->
        <section class="bg-white dark:bg-gray-800 rounded-xl p-6 md:p-10 mb-6 transition-colors duration-300">
            <h2 class="text-base md:text-2xl mb-6 font-semibold">
                Add Transaction
            </h2>

            <form id="formTransaction" class="space-y-4">

                <!-- Item Name -->
                <div>
                    <label class="block mb-1 text-sm md:text-base font-medium">
                        Item Name
                    </label>
                    <input
						id="itemName"
                        type="text" 
                        placeholder="Masukkan nama item"
                        class="w-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors duration-300"
                    >
                </div>

                <!-- Amount -->
                <div>
                    <label class="block mb-1 text-sm md:text-base font-medium">
                        Amount
                    </label>
                    <input
						id="amount"
                        type="number" 
						step="0.01"
                        placeholder="Amount"
                        class="w-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors duration-300"
                    >
                </div>

                <!-- Category -->
                <div>
                    <label class="py-1 block text-sm md:text-base font-medium">
                        Category
                    </label>
                    <div class="flex gap-2">
                        <select
                            id="category"
                            class="w-full border-2 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-white rounded px-3 py-2 transition-colors duration-300"
                        >
                            <option value="">Pilih kategori</option>
                        </select>
    
                        <button 
                            type="button" 
                            onclick="openModal()" 
                            class="px-4 py-2 text-sm md:text-base 
                                bg-gray-100 dark:bg-gray-700 
                                hover:bg-gray-200 dark:hover:bg-gray-600 
                                text-gray-700 dark:text-gray-200 
                                rounded border border-gray-300 dark:border-gray-600 
                                transition-all duration-300"
                        >
                            Manage
                        </button>
                    </div>
				</div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded"
                >
                    Add Transaction
                </button>

            </form>
        </section>

        <!-- DATA VISUALIZATION SECTION -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- LIST TRANSACTION -->
            <div class="bg-white dark:bg-gray-800 rounded-xl p-6 shadow hover:shadow-md transition-all duration-300">
                <div class="flex justify-between items-center   ">

                    <h2 class="text-lg md:text-xl font-semibold mb-4">
                        Transactions
                    </h2>
    
                    <div class="flex flex-wrap gap-2 mb-4">
    
                        <!-- SORT TOGGLE -->
                        <button 
                            id="sortButton"
                            onclick="toggleSort()"
                            class="px-3 py-1 
                                bg-gray-200 dark:bg-gray-700 
                                text-gray-800 dark:text-gray-200 
                                rounded text-sm 
                                hover:bg-gray-300 dark:hover:bg-gray-600 
                                transition-all duration-300"
                        >
                            ↓↑
                        </button>
    
                        <!-- FILTER CATEGORY -->
                        <select id="filterCategory" onchange="applyFilter()"
                            class="px-2 py-1 border border-gray-300 dark:border-gray-600 
                                bg-white dark:bg-gray-700 
                                text-gray-800 dark:text-white 
                                rounded text-sm transition-colors duration-300"
                            <option value="">All</option>
                        </select>
    
                    </div>
                </div>

                <div id="transactionList" class="h-[530px] overflow-y-auto space-y-3 pr-2"></div>
                    <!-- isi dari JS -->
                </div>
            </div>

            <!-- PIE CHART -->
            <div class="bg-white dark:bg-gray-800 rounded-xl justify-center item-center h-auto md:min-h-[650px] p-6 shadow hover:shadow-md transition-all duration-300">
                <h2 class="text-lg md:text-xl font-semibold mb-4">
                    Spending by Category
                </h2>

                <canvas id="pieChart"></canvas>
            </div>

        </section>
    </main>

	<!-- MODAL -->
	<div id="categoryModal" 
		onclick="closeModal()"
		class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 transition-opacity duration-300 opacity-0">

		<!-- CONTENT -->
		<div id="modalContent"
			onclick="event.stopPropagation()"
            class="bg-white dark:bg-gray-800 text-gray-800 dark:text-white rounded-xl p-6 w-full max-w-md transform scale-95 transition-all duration-300"

            >
			<h2 class="text-lg font-bold mb-4">Manage Categories</h2>

			<!-- INPUT -->
			<div class="flex gap-2 mb-4">
				<input 
					id="newCategory"
					type="text"
					placeholder="New category"
                    class="flex-1 border-2 border-gray-300 dark:border-gray-600 
                        bg-white dark:bg-gray-700 
                        text-gray-800 dark:text-white 
                        rounded px-3 py-2 transition-colors duration-300"
				>
				<button onclick="addCategory()" class="bg-blue-500 text-white px-3 rounded">
					Add
				</button>
			</div>

			<!-- LIST -->
			<div id="categoryList" class="space-y-2 max-h-40 pr-2 overflow-y-auto"></div>

			<!-- CLOSE -->
			<button onclick="closeModal()" class="mt-4 w-full bg-gray-500 hover:bg-gray-600 dark:bg-gray-700 dark:hover:bg-gray-600 text-white py-2 rounded transition-all duration-300">
				Close
			</button>

		</div>
	</div>

	<script src="index.js"></script>
</body>
</html>
