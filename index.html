<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Coding Project RevoU</title>
    <script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 text-gray-800">
	<!--HEADER -->
    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-7 py-4 flex justify-between items-center">
            <h1 class="text-lg md:text-xl font-bold">Mini Coding Project</h1>

            <!-- NAV -->
            <nav class="hidden md:flex gap-6">
                <a href="#" class="hover:text-blue-500">Monthly Summary</a>
                <a href="#" class="hover:text-blue-500">Contact</a>
            </nav>

            <!-- MOBILE MENU BUTTON -->
            <button class="md:hidden text-xl">
                ☰
            </button>
        </div>
    </header>

    <!-- 📄 MAIN -->
    <main class="max-w-7xl mx-auto px-4 py-6">
		<!-- PENGELUARAN SECTION -->
		<h2 class="flex item-center justify-center text-base md:text-2xl mb-8 font-bold ">
        Expense & Budget Visualizer
        </h2>
        <section class="bg-white rounded-xl p-6 md:p-10 mb-6">
            <h2 class="flex justify-center item-center text-base text-gray-500 md:text-xl mb-4">
                TOTAL BALANCE
            </h2>
            <h1 id="totalBalance" class="flex justify-center item-center text-blue-500 text-4xl md:text-7xl font-bold mb-6">
				$0
			</h1>
        </section>

        <!-- TRANSACTION SECTION -->
        <section class="bg-white text-black rounded-xl p-6 md:p-10 mb-6">
            <h2 class="text-base md:text-2xl mb-6 font-semibold">
                Add Transaction
            </h2>

            <form id="formTransaction" class="space-y-4">

                <!-- Item Name -->
                <div>
                    <label class="block mb-1 text-sm md:text-base font-medium">
                        Item Name
                    </label>
                    <input
						id="itemName"
                        type="text" 
                        placeholder="Masukkan nama item"
                        class="w-full border-2 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    >
                </div>

                <!-- Amount -->
                <div>
                    <label class="block mb-1 text-sm md:text-base font-medium">
                        Amount
                    </label>
                    <input
						id="amount"
                        type="number" 
						step="0.01"
                        placeholder="Amount"
                        class="w-full border-2 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    >
                </div>

                <!-- Category -->
                <div class="flex gap-2">
					<select
						id="category"
						class="w-full border-2 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
					>
						<option value="">Pilih kategori</option>
						<option value="food">Food</option>
						<option value="transport">Transport</option>
						<option value="shopping">Fun</option>
					</select>

					<button 
						type="button" 
						onclick="openModal()" 
						class="px-4 py-2 text-sm md:text-base bg-gray-100 hover:bg-gray-200 text-gray-700 rounded border border-gray-300 transition"
					>
						Manage
					</button>
				</div>

                <!-- Submit Button -->
                <button 
                    type="submit"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded"
                >
                    Add Transaction
                </button>

            </form>
        </section>
    </main>

	<!-- MODAL -->
	<div id="categoryModal" 
		onclick="closeModal()"
		class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 transition-opacity duration-300 opacity-0">

		<!-- CONTENT -->
		<div id="modalContent"
			onclick="event.stopPropagation()"
			class="bg-white rounded-xl p-6 w-full max-w-md transform scale-95 transition-all duration-300">

			<h2 class="text-lg font-bold mb-4">Manage Categories</h2>

			<!-- INPUT -->
			<div class="flex gap-2 mb-4">
				<input 
					id="newCategory"
					type="text"
					placeholder="New category"
					class="flex-1 border-2 rounded px-3 py-2"
				>
				<button onclick="addCategory()" class="bg-blue-500 text-white px-3 rounded">
					Add
				</button>
			</div>

			<!-- LIST -->
			<div id="categoryList" class="space-y-2 max-h-40 overflow-y-auto"></div>

			<!-- CLOSE -->
			<button onclick="closeModal()" class="mt-4 w-full bg-gray-500 text-white py-2 rounded">
				Close
			</button>

		</div>
	</div>

	<script src="index.js"></script>
</body>
</html>
